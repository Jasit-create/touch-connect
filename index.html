<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Battle PRO (DB Connected)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; color: white; font-family: sans-serif; display: flex; }
        #ui {
            width: 70px; height: 100vh; background: #111; display: flex; flex-direction: column;
            align-items: center; padding: 10px 0; gap: 6px; border-right: 1px solid #222; z-index: 100;
            overflow-y: auto; scrollbar-width: none;
        }
        #ui::-webkit-scrollbar { display: none; }
        .color-btn { width: 36px; height: 36px; border-radius: 6px; border: none; cursor: pointer; transition: 0.1s; flex-shrink: 0; }
        .color-btn.active { transform: scale(1.1); border: 2px solid white; z-index: 2; }
        .tool-btn { width: 42px; height: 42px; background: #222; border: 1px solid #333; border-radius: 10px; cursor: pointer; font-size: 20px; margin: 10px 0; }
        #eraser.active { background: #ff2d55; border-color: white; }
        canvas { position: absolute; left: 70px; top: 0; touch-action: none; cursor: grab; z-index: 1; }
        #room-info { 
            position: fixed; top: 15px; right: 20px; font-size: 11px; 
            background: rgba(0,0,0,0.9); padding: 8px 16px; border-radius: 30px; 
            z-index: 100; border: 1px solid #333; display: flex; gap: 10px;
        }
        #status { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div class="color-btn active" style="background: #ff2d55;" data-color="#ff2d55"></div>
    <div class="color-btn" style="background: #ff0000;" data-color="#ff0000"></div>
    <div class="color-btn" style="background: #00ff00;" data-color="#00ff00"></div>
    <div class="color-btn" style="background: #00bfff;" data-color="#00bfff"></div>
    <div class="color-btn" style="background: #ffffff;" data-color="#ffffff"></div>
    <div class="color-btn" style="background: #000000;" data-color="#000000"></div>
    <button id="eraser" class="tool-btn">✏️</button>
</div>

<div id="room-info">
    <span id="room-id-display">ID: ...</span>
    <span>ONLINE: <span id="online-count">1</span></span>
    <span id="status">DB OK</span>
</div>
<canvas id="canvas"></canvas>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let roomID = urlParams.get('id') || Math.random().toString(36).substr(2, 12);
    if (!urlParams.get('id')) window.history.replaceState(null, null, "?id=" + roomID);
    document.getElementById('room-id-display').innerText = "ID: " + roomID.toUpperCase();

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const serverUrl = "http://localhost:3000";
    
    let pixels = {}; 
    const cellSize = 20;
    const canvasLimit = 2000;
    let scale = 1.0, offsetX = 0, offsetY = 0;
    let currentColor = '#ff2d55', isEraser = false;
    const myId = Math.random().toString(36).substr(2, 9);

    // --- 1. ЗАГРУЗКА ИЗ БАЗЫ ДАННЫХ ---
    async function loadFromDB() {
        try {
            const res = await fetch(`${serverUrl}/pixels/${roomID}`);
            if (res.ok) {
                pixels = await res.json();
                draw();
                document.getElementById('status').innerText = "DB CONNECTED";
            }
        } catch (e) {
            document.getElementById('status').innerText = "DB OFFLINE";
            console.warn("Бэкенд не запущен?");
        }
    }
    loadFromDB();

    // --- 2. MQTT (ДЛЯ ОНЛАЙНА) ---
    const client = mqtt.connect('wss://test.mosquitto.org:8081');
    const mainTopic = `pixel_private_${roomID}`;
    
    client.on('connect', () => {
        client.subscribe(mainTopic);
    });

    client.on('message', (topic, payload) => {
        const m = JSON.parse(payload.toString());
        if (m.sender !== myId) {
            if (m.color === 'erase') delete pixels[`${m.x},${m.y}`];
            else pixels[`${m.x},${m.y}`] = m.color;
            draw();
        }
    });

    // --- 3. ЛОГИКА РИСОВАНИЯ И СОХРАНЕНИЯ ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);
        
        // Сетка
        ctx.beginPath();
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 0.5 / scale;
        for (let i = 0; i <= canvasLimit; i += cellSize) {
            ctx.moveTo(i, 0); ctx.lineTo(i, canvasLimit);
            ctx.moveTo(0, i); ctx.lineTo(canvasLimit, i);
        }
        ctx.stroke();

        // Пиксели
        for (let key in pixels) {
            const [px, py] = key.split(',').map(Number);
            ctx.fillStyle = pixels[key];
            ctx.fillRect(px, py, cellSize, cellSize);
        }
        ctx.restore();
    }

    // Обработка клика
    window.addEventListener('pointerup', async (e) => {
        if (isMouseDown && !hasDragged) {
            const rect = canvas.getBoundingClientRect();
            const worldX = Math.floor(((e.clientX - rect.left) - offsetX) / scale / cellSize) * cellSize;
            const worldY = Math.floor(((e.clientY - rect.top) - offsetY) / scale / cellSize) * cellSize;

            if (worldX >= 0 && worldX < canvasLimit && worldY >= 0 && worldY < canvasLimit) {
                const drawColor = isEraser ? 'erase' : currentColor;
                
                // А) Сохраняем в базу (на сервер)
                fetch(`${serverUrl}/pixels`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomId: roomID, x: worldX, y: worldY, color: drawColor })
                });

                // Б) Отправляем другу через MQTT
                client.publish(mainTopic, JSON.stringify({ x: worldX, y: worldY, color: drawColor, sender: myId }));

                // В) Рисуем у себя
                if (isEraser) delete pixels[`${worldX},${worldY}`];
                else pixels[`${worldX},${worldY}`] = drawColor;
                draw();
            }
        }
        isMouseDown = false;
    });

    // ОСТАЛЬНЫЕ ФУНКЦИИ (Управление)
    let isMouseDown = false, hasDragged = false, startX, startY;
    canvas.addEventListener('pointerdown', (e) => { isMouseDown = true; hasDragged = false; startX = e.clientX; startY = e.clientY; });
    window.addEventListener('pointermove', (e) => {
        if (!isMouseDown) return;
        const dx = e.clientX - startX, dy = e.clientY - startY;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            hasDragged = true; offsetX += dx; offsetY += dy;
            startX = e.clientX; startY = e.clientY; draw();
        }
    });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const oldScale = scale;
        scale = Math.min(Math.max(0.15, scale + (e.deltaY > 0 ? -0.1 : 0.1)), 10);
        const rect = canvas.getBoundingClientRect();
        offsetX -= (e.clientX - rect.left - offsetX) * (scale / oldScale - 1);
        offsetY -= (e.clientY - rect.top - offsetY) * (scale / oldScale - 1);
        draw();
    }, { passive: false });

    function resize() { canvas.width = window.innerWidth - 70; canvas.height = window.innerHeight; draw(); }
    window.addEventListener('resize', resize);
    resize();

    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.onclick = () => {
            isEraser = false;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            eraserBtn.classList.remove('active');
            btn.classList.add('active');
            currentColor = btn.dataset.color;
        };
    });
    const eraserBtn = document.getElementById('eraser');
    eraserBtn.onclick = () => {
        isEraser = true;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        eraserBtn.classList.add('active');
    };
    canvas.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
