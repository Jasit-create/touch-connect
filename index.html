<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Pixel Art 50 Colors</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; color: white; font-family: sans-serif; display: flex; }
        
        #ui {
            width: 70px; height: 100vh; background: #111; display: flex; flex-direction: column;
            align-items: center; padding: 10px 0; gap: 6px; border-right: 1px solid #222; z-index: 100;
            overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;
        }
        #ui::-webkit-scrollbar { display: none; }

        .color-btn {
            width: 36px; height: 36px; border-radius: 6px; border: none;
            cursor: pointer; transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
        }
        .color-btn:active { transform: scale(0.85); }
        .color-btn.active { transform: scale(1.1); border: 2px solid white; border-radius: 8px; z-index: 2; }

        .tool-btn { 
            width: 42px; height: 42px; background: #222; border: 1px solid #333; border-radius: 10px; 
            cursor: pointer; font-size: 20px; transition: 0.2s; margin: 10px 0; flex-shrink: 0;
        }
        #eraser.active { background: #ff2d55; border-color: white; transform: scale(1.1); }

        canvas { position: absolute; left: 70px; top: 0; touch-action: none; cursor: grab; z-index: 1; }
        
        #room-info { 
            position: fixed; top: 15px; right: 20px; font-size: 11px; 
            background: rgba(0,0,0,0.95); padding: 8px 16px; border-radius: 30px; 
            z-index: 100; border: 1px solid #222; display: flex; gap: 10px; align-items: center;
        }
        #online-count { color: #00fbff; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div class="color-btn active" style="background: #ff2d55;" data-color="#ff2d55"></div>
    <div class="color-btn" style="background: #ff0000;" data-color="#ff0000"></div>
    <div class="color-btn" style="background: #8b0000;" data-color="#8b0000"></div>
    <div class="color-btn" style="background: #ff69b4;" data-color="#ff69b4"></div>
    <div class="color-btn" style="background: #ff1493;" data-color="#ff1493"></div>
    <div class="color-btn" style="background: #db7093;" data-color="#db7093"></div>
    <div class="color-btn" style="background: #ff4500;" data-color="#ff4500"></div>
    <div class="color-btn" style="background: #ff8c00;" data-color="#ff8c00"></div>
    <div class="color-btn" style="background: #ffa500;" data-color="#ffa500"></div>
    <div class="color-btn" style="background: #ffd700;" data-color="#ffd700"></div>
    <div class="color-btn" style="background: #ffff00;" data-color="#ffff00"></div>
    <div class="color-btn" style="background: #f0e68c;" data-color="#f0e68c"></div>
    <div class="color-btn" style="background: #adff2f;" data-color="#adff2f"></div>
    <div class="color-btn" style="background: #7fff00;" data-color="#7fff00"></div>
    <div class="color-btn" style="background: #00ff00;" data-color="#00ff00"></div>
    <div class="color-btn" style="background: #32cd32;" data-color="#32cd32"></div>
    <div class="color-btn" style="background: #008000;" data-color="#008000"></div>
    <div class="color-btn" style="background: #006400;" data-color="#006400"></div>
    <div class="color-btn" style="background: #66cdaa;" data-color="#66cdaa"></div>
    <div class="color-btn" style="background: #20b2aa;" data-color="#20b2aa"></div>
    <div class="color-btn" style="background: #00ffff;" data-color="#00ffff"></div>
    <div class="color-btn" style="background: #afeeee;" data-color="#afeeee"></div>
    <div class="color-btn" style="background: #00bfff;" data-color="#00bfff"></div>
    <div class="color-btn" style="background: #1e90ff;" data-color="#1e90ff"></div>
    <div class="color-btn" style="background: #0000ff;" data-color="#0000ff"></div>
    <div class="color-btn" style="background: #00008b;" data-color="#00008b"></div>
    <div class="color-btn" style="background: #483d8b;" data-color="#483d8b"></div>
    <div class="color-btn" style="background: #e02dff;" data-color="#e02dff"></div>
    <div class="color-btn" style="background: #9370db;" data-color="#9370db"></div>
    <div class="color-btn" style="background: #8a2be2;" data-color="#8a2be2"></div>
    <div class="color-btn" style="background: #4b0082;" data-color="#4b0082"></div>
    <div class="color-btn" style="background: #ee82ee;" data-color="#ee82ee"></div>
    <div class="color-btn" style="background: #ffe4c4;" data-color="#ffe4c4"></div>
    <div class="color-btn" style="background: #deb887;" data-color="#deb887"></div>
    <div class="color-btn" style="background: #d2691e;" data-color="#d2691e"></div>
    <div class="color-btn" style="background: #8b4513;" data-color="#8b4513"></div>
    <div class="color-btn" style="background: #a0522d;" data-color="#a0522d"></div>
    <div class="color-btn" style="background: #5d4037;" data-color="#5d4037"></div>
    <div class="color-btn" style="background: #ffffff;" data-color="#ffffff"></div>
    <div class="color-btn" style="background: #f5f5f5;" data-color="#f5f5f5"></div>
    <div class="color-btn" style="background: #dcdcdc;" data-color="#dcdcdc"></div>
    <div class="color-btn" style="background: #c0c0c0;" data-color="#c0c0c0"></div>
    <div class="color-btn" style="background: #a9a9a9;" data-color="#a9a9a9"></div>
    <div class="color-btn" style="background: #808080;" data-color="#808080"></div>
    <div class="color-btn" style="background: #696969;" data-color="#696969"></div>
    <div class="color-btn" style="background: #444444;" data-color="#444444"></div>
    <div class="color-btn" style="background: #222222;" data-color="#222222"></div>
    <div class="color-btn" style="background: #111111;" data-color="#111111"></div>
    <div class="color-btn" style="background: #000000;" data-color="#000000"></div>

    <button id="eraser" class="tool-btn">✏️</button>
</div>

<div id="room-info">
    <span id="room-id-display">SECRET ROOM</span>
    <span>ONLINE: <span id="online-count">1</span></span>
</div>
<canvas id="canvas"></canvas>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let roomID = urlParams.get('id');

    if (!roomID) {
        roomID = Math.random().toString(36).substr(2, 12);
        window.history.replaceState(null, null, "?id=" + roomID);
    }
    document.getElementById('room-id-display').innerText = "ID: " + roomID.toUpperCase();

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const onlineDisplay = document.getElementById('online-count');
    
    let pixels = {}; 
    const cellSize = 20;
    const canvasLimit = 2000;
    let scale = 1.0;
    let offsetX = 0;
    let offsetY = 0;
    let currentColor = '#ff2d55';
    let isEraser = false;

    const myId = Math.random().toString(36).substr(2, 9);
    const client = mqtt.connect('wss://test.mosquitto.org:8081');
    const mainTopic = `pixel_private_${roomID}`;
    const presenceTopic = `${mainTopic}/presence`;

    let onlineUsers = {};

    client.on('connect', () => {
        client.subscribe(mainTopic);
        client.subscribe(presenceTopic);
        setInterval(() => client.publish(presenceTopic, JSON.stringify({ id: myId, t: Date.now() })), 4000);
    });

    client.on('message', (topic, payload) => {
        const m = JSON.parse(payload.toString());
        if (topic === presenceTopic) {
            onlineUsers[m.id] = Date.now();
            updateOnline();
        } else {
            if (m.sender !== myId) {
                if (m.color === 'erase') delete pixels[`${m.x},${m.y}`];
                else pixels[`${m.x},${m.y}`] = m.color;
                draw();
            }
        }
    });

    function updateOnline() {
        const now = Date.now();
        let count = 0;
        for (let id in onlineUsers) {
            if (now - onlineUsers[id] < 10000) count++;
            else delete onlineUsers[id];
        }
        onlineDisplay.innerText = count;
    }

    function resize() {
        canvas.width = window.innerWidth - 70;
        canvas.height = window.innerHeight;
        draw();
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        ctx.beginPath();
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 0.5 / scale;
        for (let i = 0; i <= canvasLimit; i += cellSize) {
            ctx.moveTo(i, 0); ctx.lineTo(i, canvasLimit);
            ctx.moveTo(0, i); ctx.lineTo(canvasLimit, i);
        }
        ctx.stroke();

        for (let key in pixels) {
            const [px, py] = key.split(',').map(Number);
            ctx.fillStyle = pixels[key];
            ctx.fillRect(px, py, cellSize, cellSize);
        }
        ctx.restore();
    }

    let isMouseDown = false;
    let hasDragged = false;
    let startX, startY;

    canvas.addEventListener('pointerdown', (e) => {
        isMouseDown = true;
        hasDragged = false;
        startX = e.clientX;
        startY = e.clientY;
    });

    window.addEventListener('pointermove', (e) => {
        if (!isMouseDown) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            hasDragged = true;
            offsetX += dx;
            offsetY += dy;
            startX = e.clientX;
            startY = e.clientY;
            draw();
        }
    });

    window.addEventListener('pointerup', (e) => {
        if (isMouseDown && !hasDragged) {
            const rect = canvas.getBoundingClientRect();
            const worldX = Math.floor(((e.clientX - rect.left) - offsetX) / scale / cellSize) * cellSize;
            const worldY = Math.floor(((e.clientY - rect.top) - offsetY) / scale / cellSize) * cellSize;
            
            if (worldX >= 0 && worldX < canvasLimit && worldY >= 0 && worldY < canvasLimit) {
                const drawColor = isEraser ? 'erase' : currentColor;
                client.publish(mainTopic, JSON.stringify({ x: worldX, y: worldY, color: drawColor, sender: myId }));
                if (isEraser) delete pixels[`${worldX},${worldY}`];
                else pixels[`${worldX},${worldY}`] = drawColor;
                draw();
            }
        }
        isMouseDown = false;
    });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const oldScale = scale;
        scale = Math.min(Math.max(0.15, scale + (e.deltaY > 0 ? -0.1 : 0.1)), 6);
        const rect = canvas.getBoundingClientRect();
        offsetX -= (e.clientX - rect.left - offsetX) * (scale / oldScale - 1);
        offsetY -= (e.clientY - rect.top - offsetY) * (scale / oldScale - 1);
        draw();
    }, { passive: false });

    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.onclick = () => {
            isEraser = false;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            eraserBtn.classList.remove('active');
            btn.classList.add('active');
            currentColor = btn.dataset.color;
        };
    });

    const eraserBtn = document.getElementById('eraser');
    eraserBtn.onclick = () => {
        isEraser = true;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        eraserBtn.classList.add('active');
    };

    canvas.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
