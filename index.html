<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Sync Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; color: white; font-family: sans-serif; display: flex; }
        #ui {
            width: 70px; background: #111; display: flex; flex-direction: column;
            align-items: center; padding: 10px 0; gap: 8px; border-right: 1px solid #333; z-index: 10;
            overflow-y: auto;
        }
        .color-btn {
            width: 35px; height: 35px; border-radius: 50%; border: 2px solid transparent;
            cursor: pointer; flex-shrink: 0; transition: transform 0.1s;
        }
        .color-btn.active { border-color: white; transform: scale(1.1); }
        #eraser { width: 35px; height: 35px; background: #222; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-size: 18px; }
        #eraser.active { background: #ff2d55; border-color: white; }
        canvas { touch-action: none; cursor: crosshair; }
        #hint { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #555; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">
    <div class="color-btn active" style="background: #ff2d55;" data-color="#ff2d55"></div>
    <div class="color-btn" style="background: #ff69b4;" data-color="#ff69b4"></div>
    <div class="color-btn" style="background: #ff1493;" data-color="#ff1493"></div>
    <div class="color-btn" style="background: #00fbff;" data-color="#00fbff"></div>
    <div class="color-btn" style="background: #007bff;" data-color="#007bff"></div>
    <div class="color-btn" style="background: #beff00;" data-color="#beff00"></div>
    <div class="color-btn" style="background: #ffcf00;" data-color="#ffcf00"></div>
    <div class="color-btn" style="background: #ffffff;" data-color="#ffffff"></div>
    <div class="color-btn" style="background: #888888;" data-color="#888888"></div>
    <button id="eraser">🧹</button>
</div>
