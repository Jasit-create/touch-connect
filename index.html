<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Drag & Draw</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; color: white; font-family: sans-serif; display: flex; }
        #ui {
            width: 70px; height: 100vh; background: #111; display: flex; flex-direction: column;
            align-items: center; padding: 15px 0; gap: 10px; border-right: 1px solid #333; z-index: 100;
        }
        .color-btn {
            width: 38px; height: 38px; border-radius: 10px; border: 2px solid transparent;
            cursor: pointer; transition: 0.1s;
        }
        .color-btn.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px white; }
        .tool-btn { 
            width: 42px; height: 42px; background: #222; border: 1px solid #444; border-radius: 10px; 
            cursor: pointer; font-size: 20px; color: white; display: flex; align-items: center; justify-content: center;
        }
        #eraser.active { background: #ff2d55; border-color: white; }
        canvas { position: absolute; left: 70px; top: 0; touch-action: none; cursor: grab; z-index: 1; }
        canvas:active { cursor: grabbing; }
        #room-info { 
            position: fixed; top: 15px; right: 20px; font-size: 11px; color: #00fbff; 
            background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 20px; 
            z-index: 100; border: 1px solid #00fbff;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="color-btn active" style="background: #ff2d55;" data-color="#ff2d55"></div>
    <div class="color-btn" style="background: #ff69b4;" data-color="#ff69b4"></div>
    <div class="color-btn" style="background: #00fbff;" data-color="#00fbff"></div>
    <div class="color-btn" style="background: #beff00;" data-color="#beff00"></div>
    <div class="color-btn" style="background: #ffffff;" data-color="#ffffff"></div>
    <button id="eraser" class="tool-btn">🧹</button>
    <div style="flex-grow: 1;"></div>
    <button id="clear" class="tool-btn">🗑️</button>
    <button id="save" class="tool-btn">💾</button>
</div>

<div id="room-info">ROOM: LOADING...</div>
<canvas id="canvas"></canvas>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomName = urlParams.get('room') || 'secret_battle';
    document.getElementById('room-info').innerText = `ROOM: ${roomName.toUpperCase()}`;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let pixels = {}; 
    const cellSize = 20;
    let scale = 1.0;
    let offsetX = 0;
    let offsetY = 0;
    let currentColor = '#ff2d55';
    let isEraser = false;

    // MQTT
    const client = mqtt.connect('wss://test.mosquitto.org:8081');
    const topic = `pixel_battle/room/${roomName}`;

    client.on('connect', () => client.subscribe(topic));
    client.on('message', (t, p) => {
        const m = JSON.parse(p.toString());
        if (m.type === 'clear') pixels = {};
        else if (m.color === 'erase') delete pixels[`${m.x},${m.y}`];
        else pixels[`${m.x},${m.y}`] = m.color;
        draw();
    });

    function resize() {
        canvas.width = window.innerWidth - 70;
        canvas.height = window.innerHeight;
        draw();
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        // Сетка
        ctx.beginPath();
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 0.5 / scale;
        for (let i = -2000; i <= 2000; i += cellSize) {
            ctx.moveTo(i, -2000); ctx.lineTo(i, 2000);
            ctx.moveTo(-2000, i); ctx.lineTo(2000, i);
        }
        ctx.stroke();

        for (let key in pixels) {
            const [px, py] = key.split(',').map(Number);
            ctx.fillStyle = pixels[key];
            ctx.fillRect(px, py, cellSize, cellSize);
        }
        ctx.restore();
    }

    // --- Логика перетаскивания и рисования ---
    let isMouseDown = false;
    let hasDragged = false;
    let startX, startY;

    canvas.addEventListener('pointerdown', (e) => {
        isMouseDown = true;
        hasDragged = false;
        startX = e.clientX;
        startY = e.clientY;
    });

    window.addEventListener('pointermove', (e) => {
        if (!isMouseDown) return;
        
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        // Если сдвинули больше чем на 5 пикселей - считаем это движением камеры
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            hasDragged = true;
            offsetX += dx;
            offsetY += dy;
            startX = e.clientX;
            startY = e.clientY;
            draw();
        }
    });

    window.addEventListener('pointerup', (e) => {
        if (isMouseDown && !hasDragged) {
            // Если не двигали экран, значит это был клик (ставим пиксель)
            const rect = canvas.getBoundingClientRect();
            const worldX = Math.floor(((e.clientX - rect.left) - offsetX) / scale / cellSize) * cellSize;
            const worldY = Math.floor(((e.clientY - rect.top) - offsetY) / scale / cellSize) * cellSize;
            
            const drawColor = isEraser ? 'erase' : currentColor;
            client.publish(topic, JSON.stringify({ x: worldX, y: worldY, color: drawColor }));
            
            if (isEraser) delete pixels[`${worldX},${worldY}`];
            else pixels[`${worldX},${worldY}`] = drawColor;
            draw();
        }
        isMouseDown = false;
    });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const oldScale = scale;
        scale = Math.min(Math.max(0.2, scale + (e.deltaY > 0 ? -0.1 : 0.1)), 5);
        const rect = canvas.getBoundingClientRect();
        offsetX -= (e.clientX - rect.left - offsetX) * (scale / oldScale - 1);
        offsetY -= (e.clientY - rect.top - offsetY) * (scale / oldScale - 1);
        draw();
    }, { passive: false });

    // Кнопки палитры
    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.onclick = () => {
            isEraser = false;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            eraserBtn.classList.remove('active');
            btn.classList.add('active');
            currentColor = btn.dataset.color;
        };
    });

    const eraserBtn = document.getElementById('eraser');
    eraserBtn.onclick = () => {
        isEraser = true;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        eraserBtn.classList.add('active');
    };

    document.getElementById('clear').onclick = () => {
        if(confirm('Очистить всё?')) {
            client.publish(topic, JSON.stringify({ type: 'clear' }));
            pixels = {}; draw();
        }
    };

    document.getElementById('save').onclick = () => {
        const link = document.createElement('a');
        link.download = 'pixel_art.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    canvas.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
