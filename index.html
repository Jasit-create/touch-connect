<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Love Battle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: sans-serif; display: flex; }
        
        /* Сетка фона */
        #canvas-container {
            position: relative;
            flex-grow: 1;
            height: 100vh;
            background-image: 
                linear-gradient(to right, #1a1a1a 1px, transparent 1px),
                linear-gradient(to bottom, #1a1a1a 1px, transparent 1px);
            background-size: 20px 20px; /* Размер клетки */
            cursor: crosshair;
        }

        /* Боковая панель */
        #toolbar {
            width: 60px;
            background: #151515;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            gap: 15px;
            border-right: 1px solid #333;
            z-index: 10;
        }

        .color-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .color-btn.active { border-color: white; transform: scale(1.1); }

        #eraser {
            width: 35px;
            height: 35px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        #eraser.active { background: #ff4d6d; }

        .pixel {
            position: absolute;
            width: 20px;
            height: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="color-btn active" style="background: #ff2d55;" data-color="#ff2d55"></div> <div class="color-btn" style="background: #00fbff;" data-color="#00fbff"></div> <div class="color-btn" style="background: #beff00;" data-color="#beff00"></div> <div class="color-btn" style="background: #ffffff;" data-color="#ffffff"></div> <button id="eraser" title="Ластик">🧹</button>
    </div>

    <div id="canvas-container" id="board"></div>

    <script>
        const container = document.getElementById('canvas-container');
        const colors = document.querySelectorAll('.color-btn');
        const eraserBtn = document.getElementById('eraser');
        
        let currentColor = '#ff2d55';
        let isEraser = false;
        const cellSize = 20;

        // Настройка связи
        const room = "pixel_battle_secret_999"; 
        const client = mqtt.connect('wss://test.mosquitto.org:8081');

        client.on('connect', () => {
            client.subscribe(room);
        });

        // Выбор цвета
        colors.forEach(btn => {
            btn.addEventListener('click', () => {
                isEraser = false;
                eraserBtn.classList.remove('active');
                colors.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = btn.dataset.color;
            });
        });

        // Ластик
        eraserBtn.addEventListener('click', () => {
            isEraser = true;
            colors.forEach(b => b.classList.remove('active'));
            eraserBtn.classList.add('active');
        });

        function placePixel(x, y, color, remoteId) {
            const id = `p-${x}-${y}`;
            let pixel = document.getElementById(id);

            if (color === 'erase') {
                if (pixel) pixel.remove();
            } else {
                if (!pixel) {
                    pixel = document.createElement('div');
                    pixel.id = id;
                    pixel.className = 'pixel';
                    pixel.style.left = x + 'px';
                    pixel.style.top = y + 'px';
                    container.appendChild(pixel);
                }
                pixel.style.background = color;
                pixel.style.boxShadow = `0 0 5px ${color}`;
            }
        }

        // Клик по холсту
        container.addEventListener('pointerdown', (e) => {
            const rect = container.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / cellSize) * cellSize;
            const y = Math.floor((e.clientY - rect.top) / cellSize) * cellSize;
            
            const drawColor = isEraser ? 'erase' : currentColor;
            
            // Отправляем в сеть
            client.publish(room, JSON.stringify({ x, y, color: drawColor }));
            // Рисуем у себя
            placePixel(x, y, drawColor);
        });

        // Получаем пиксели от партнера
        client.on('message', (topic, payload) => {
            const m = JSON.parse(payload.toString());
            placePixel(m.x, m.y, m.color);
        });
    </script>
</body>
</html>
